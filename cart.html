<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إتمام الطلب - سلة التسوق</title>
    
    <!-- مكتبة EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function(){
            emailjs.init("i5QnZcuDJqQATOdXE"); 
        })();
    </script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background: #f9f9f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #ddd; padding: 15px; text-align: center; }
        .cart-img { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; }
        
        /* تنسيق زر الحذف */
        .delete-btn { background: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .delete-btn:hover { background: #c0392b; }

        .total { font-weight: bold; font-size: 1.5em; margin-top: 20px; color: #2c3e50; text-align: left; }
        .checkout-form { margin-top: 30px; padding: 25px; border: 1px solid #eee; border-radius: 10px; background: #fff; }
        .input-group { margin-bottom: 15px; }
        input[type="text"], input[type="tel"] { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .checkout-btn { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; cursor: pointer; font-size: 18px; border-radius: 5px; }
        .checkout-btn:hover { background: #219150; }
        .actions { margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛒 سلة التسوق</h1>
    <table id="cart-table">
        <thead>
            <tr>
                <th>الصورة</th>
                <th>المنتج</th>
                <th>السعر</th>
                <th>حذف</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="total" id="total-price">الإجمالي: 0 دولار</div>

    <div class="checkout-form">
        <h3>تفاصيل التوصيل</h3>
        <div class="input-group"><input type="text" id="name" placeholder="الاسم الكامل" required></div>
        <div class="input-group"><input type="text" id="address" placeholder="عنوان التوصيل" required></div>
        <div class="input-group"><input type="tel" id="phone" placeholder="رقم الهاتف" required></div>
        <button class="checkout-btn" onclick="confirmOrder()">تأكيد الطلب وإرساله</button>
    </div>
    
    <div class="actions">
        <a href="index.html">← العودة للتسوق</a>
    </div>
</div>

<script>
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    const tbody = document.querySelector('#cart-table tbody');
    let total = 0;

    // دالة عرض المنتجات
    function renderCart() {
        tbody.innerHTML = '';
        total = 0;
        cart.forEach((item, index) => {
            tbody.innerHTML += `
                <tr>
                    <td><img src="${item.image}" class="cart-img"></td>
                    <td>${item.name}</td>
                    <td>${item.price} دولار</td>
                    <td><button class="delete-btn" onclick="removeItem(${index})">✕</button></td>
                </tr>`;
            total += item.price;
        });
        document.getElementById('total-price').innerText = "الإجمالي: " + total + " دولار";
    }

    // دالة حذف منتج
    function removeItem(index) {
        cart.splice(index, 1);
        localStorage.setItem('cart', JSON.stringify(cart));
        renderCart(); // تحديث الجدول بعد الحذف
    }

    // دالة تأكيد الطلب
    function confirmOrder() {
        const name = document.getElementById('name').value.trim();
        const address = document.getElementById('address').value.trim();
        const phone = document.getElementById('phone').value.trim();

        if (cart.length === 0) { alert("السلة فارغة!"); return; }
        if (name === "" || address === "" || phone === "") { alert("يرجى ملء كافة البيانات."); return; }

        let cartDetails = cart.map(item => `${item.name} (${item.price} دولار)`).join(" - ");

        emailjs.send("service_lrao7n7", "template_taghy4r", {
            user_name: name,
            user_address: address,
            user_phone: phone,
            cart_details: cartDetails,
            total_price: total
        }).then(function(response) {
            alert("تم إرسال طلبك بنجاح! سنتواصل معك قريباً.");
            localStorage.removeItem('cart');
            location.reload();
        }, function(error) {
            alert("حدث خطأ أثناء الإرسال، يرجى المحاولة لاحقاً.");
        });
    }

    renderCart();
</script>
</body>
</html>
