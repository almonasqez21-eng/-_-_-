<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إتمام الطلب - سلة التسوق</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background: #f9f9f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        h1 { text-align: center; color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #ddd; padding: 15px; text-align: center; }
        
        .cart-img { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; }
        .total { font-weight: bold; font-size: 1.5em; margin-top: 20px; color: #2c3e50; text-align: left; }
        
        .checkout-form { margin-top: 30px; padding: 25px; border: 1px solid #eee; border-radius: 10px; background: #fff; }
        .input-group { margin-bottom: 15px; }
        input[type="text"], input[type="tel"] { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        .payment-method { margin: 20px 0; padding: 15px; background: #f4f4f4; border-radius: 5px; border: 1px solid #ddd; }
        
        .checkout-btn { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; cursor: pointer; font-size: 18px; border-radius: 5px; transition: 0.3s; margin-top: 10px; }
        .checkout-btn:hover { background: #219150; }
        
        .actions { margin-top: 20px; text-align: center; }
        a { text-decoration: none; color: #666; font-weight: bold; }
        .clear-btn { background: none; border: none; color: #e74c3c; cursor: pointer; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛒 سلة التسوق</h1>
    <table id="cart-table">
        <thead>
            <tr>
                <th>الصورة</th>
                <th>المنتج</th>
                <th>السعر</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="total" id="total-price">الإجمالي: 0 دولار</div>

    <div class="checkout-form">
        <h3>تفاصيل التوصيل</h3>
        <div class="input-group">
            <input type="text" id="name" placeholder="الاسم الكامل" required>
        </div>
        <div class="input-group">
            <input type="text" id="address" placeholder="عنوان التوصيل بالتفصيل" required>
        </div>
        <div class="input-group">
            <input type="tel" id="phone" placeholder="رقم الهاتف" required>
        </div>

        <div class="payment-method">
            <label>
                <input type="radio" name="payment" value="cod" checked> 🚚 الدفع عند الاستلام (Cash on Delivery)
            </label>
        </div>

        <button class="checkout-btn" onclick="confirmOrder()">تأكيد الطلب</button>
    </div>
    
    <div class="actions">
        <a href="index.html">← العودة للتسوق</a> | 
        <button class="clear-btn" onclick="clearCart()">تفريغ السلة</button>
    </div>
</div>

<script>
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    const tbody = document.querySelector('#cart-table tbody');
    let total = 0;

    cart.forEach(item => {
        tbody.innerHTML += `
            <tr>
                <td><img src="${item.image}" class="cart-img" alt="${item.name}" onerror="this.src='https://via.placeholder.com/50'"></td>
                <td>${item.name}</td>
                <td>${item.price} دولار</td>
            </tr>`;
        total += item.price;
    });
    
    document.getElementById('total-price').innerText = "الإجمالي: " + total + " دولار";

    function confirmOrder() {
        const name = document.getElementById('name').value.trim();
        const address = document.getElementById('address').value.trim();
        const phone = document.getElementById('phone').value.trim();

        // 1. التحقق من وجود منتجات في السلة
        if (cart.length === 0) {
            alert("عذراً، السلة فارغة! يرجى إضافة منتجات قبل إتمام الطلب.");
            return;
        }

        // 2. التحقق من ملء جميع الحقول
        if (name === "" || address === "" || phone === "") {
            alert("يرجى ملء جميع بيانات التوصيل (الاسم، العنوان، ورقم الهاتف) للمتابعة.");
            return;
        }

        // إذا تم تجاوز كل الشروط
        alert("شكراً لك يا " + name + "! تم تأكيد طلبك بنجاح. سنتواصل معك على الرقم: " + phone);
        clearCart();
    }

    function clearCart() {
        localStorage.removeItem('cart');
        location.reload();
    }
</script>
</body>
</html>
