<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر التقنية - المنتجات</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --main-bg: #f9f4f1; --accent: #27ae60; --text: #333; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--main-bg); margin: 0; color: var(--text); }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 80px; background: rgba(255,255,255,0.9); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: bold; }
        
        /* تحديث تنسيق قسم الـ Hero لإضافة النص */
        .hero { height: 500px; width: 100%; position: relative; overflow: hidden; }
        .hero img { width: 100%; height: 100%; object-fit: cover; }
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.3); color: white; text-align: center; }
        .hero-overlay h1 { font-family: 'Playfair Display', serif; font-size: 48px; margin-bottom: 10px; }
        .hero-overlay p { font-size: 20px; font-weight: 300; }
        
        .container { max-width: 1200px; margin: auto; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; }
        
        .card { background: white; padding: 20px; text-align: center; border-radius: 15px; border: 1px solid #eee; transition: 0.3s; }
        .card:hover { border-color: var(--accent); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; }
        
        .btn { background: var(--accent); color: white; border: none; padding: 12px 20px; cursor: pointer; border-radius: 8px; width: 100%; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: #219150; }
        
        h3 { margin: 10px 0; color: #333; }
    </style>
</head>
<body>

<header>
    <div class="logo">متجر التقنية</div>
    <a href="cart.html" style="text-decoration:none; color:#333; font-weight:bold;">🛒 السلة (<span id="cart-count">0</span>)</a>
</header>

<div class="hero">
    <img src="hero.jpg" alt="Hero Image">
    <!-- إضافة النص هنا -->
    <div class="hero-overlay">
        <h1>متجر التقنية</h1>
        <p>أدوات ذكية، لحياة أكثر سهولة</p>
    </div>
</div>

<div class="container">
    <h2 style="text-align: center; font-family: 'Playfair Display', serif;">مجموعتنا المختارة</h2>
    <div class="grid" id="product-list"></div>
</div>

<script>
    const products = [
        {id: 1, name: "سماعات", price: 99, image: "سماعة.jpg"},
        {id: 2, name: "ماوس", price: 25, image: "ماوس.jpg"},
        {id: 3, name: "لوحة مفاتيح", price: 120, image: "لوحة مفاتيح.jpg"},
        {id: 4, name: "شاشة", price: 200, image: "شاشة.jpg"},
        {id: 5, name: "حامل لابتوب", price: 45, image: "حامل لابتوب.jpg"},
        {id: 6, name: "ميكروفون", price: 80, image: "مايكروفون.jpg"},
        {id: 7, name: "كاميرا", price: 60, image: "كاميرة.jpg"},
        {id: 8, name: "شاحن متنقل", price: 30, image: "شاحن متنقل.jpg"},
        {id: 9, name: "ساعة ذكية", price: 150, image: "ساعة ذكية.jpg"},
        {id: 10, name: "إضاءة مكتبية", price: 35, image: "إضاءة مكتبية.jpg"}
    ];

    function renderProducts() {
        const productList = document.getElementById('product-list');
        productList.innerHTML = '';
        products.forEach(p => {
            productList.innerHTML += `
                <div class="card">
                    <img src="${p.image}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/200'">
                    <h3>${p.name}</h3>
                    <p style="font-weight: bold; color: #555;">${p.price} دولار</p>
                    <button class="btn" onclick="addToCart(${p.id})">إضافة للسلة</button>
                </div>
            `;
        });
    }

    function addToCart(id) {
        const product = products.find(p => p.id === id);
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart.push(product);
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartCount();
        alert(product.name + " أضيفت للسلة!");
    }

    function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        document.getElementById('cart-count').innerText = cart.length;
    }

    renderProducts();
    updateCartCount();
</script>
</body>
</html>
