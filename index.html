<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Jewelry House Style</title>
    <!-- استيراد خطوط أنيقة -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --main-bg: #f9f4f1; --accent: #8b5d5d; --text: #333; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--main-bg); margin: 0; color: var(--text); }
        
        /* الهيدر الأنيق */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 80px; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: bold; }
        nav a { margin: 0 15px; text-decoration: none; color: var(--text); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

        /* قسم الـ Hero (الصورة الكبيرة + النص) */
        .hero { display: flex; align-items: center; justify-content: center; height: 500px; background: #eee; margin: 20px 80px; border-radius: 20px; overflow: hidden; position: relative; }
        .hero img { width: 100%; height: 100%; object-fit: cover; }
        .hero-text { position: absolute; left: 10%; color: white; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .hero-text h1 { font-family: 'Playfair Display', serif; font-size: 48px; }

        /* تنسيق الشبكة */
        .container { max-width: 1200px; margin: auto; padding: 40px; }
        .section-title { font-family: 'Playfair Display', serif; text-align: center; margin-bottom: 40px; font-size: 32px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; }
        
        /* كروت المنتجات */
        .card { background: white; padding: 20px; text-align: center; border-radius: 10px; transition: 0.3s; border: 1px solid #eee; }
        .card:hover { border-color: var(--accent); }
        .card img { width: 100%; height: 250px; object-fit: cover; border-radius: 5px; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; margin-top: 15px; font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body>

<header>
    <div class="logo">Jewelry House</div>
    <nav>
        <a href="#">الرئيسية</a>
        <a href="#">المتجر</a>
        <a href="#">اتصل بنا</a>
    </nav>
    <a href="cart.html" style="text-decoration:none; color:#333;">🛒 السلة (<span id="cart-count">0</span>)</a>
</header>

<div class="hero">
    <img src="hero.jpg" alt="Hero">
    <div class="hero-text">
        <h1>Litkovska Collection</h1>
        <button class="btn">تسوق الآن</button>
    </div>
</div>

<div class="container">
    <h2 class="section-title">تسوق حسب النوع</h2>
    <div class="grid" id="product-list"></div>
</div>

<script>
    const products = [
        {id: 1, name: "سماعات", price: 99, image: "سماعة.jpg"},
        {id: 2, name: "ماوس", price: 25, image: "ماوس.jpg"},
        {id: 3, name: "لوحة مفاتيح", price: 120, image: "لوحة مفاتيح.jpg"},
        {id: 4, name: "شاشة", price: 200, image: "شاشة.jpg"},
        {id: 5, name: "حامل لابتوب", price: 45, image: "حامل لابتوب.jpg"},
        {id: 6, name: "ميكروفون", price: 80, image: "مايكروفون.jpg"},
        {id: 7, name: "كاميرا", price: 60, image: "كاميرة.jpg"},
        {id: 8, name: "شاحن متنقل", price: 30, image: "شاحن متنقل.jpg"},
        {id: 9, name: "ساعة ذكية", price: 150, image: "ساعة ذكية.jpg"},
        {id: 10, name: "إضاءة مكتبية", price: 35, image: "إضاءة مكتبية.jpg"}
    ];

    function addToCart(id) { /* منطق السلة يبقى كما هو */
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart.push(products.find(p => p.id === id));
        localStorage.setItem('cart', JSON.stringify(cart));
        document.getElementById('cart-count').innerText = cart.length;
        alert("تمت الإضافة!");
    }

    const list = document.getElementById('product-list');
    products.forEach(p => {
        list.innerHTML += `
            <div class="card">
                <img src="${p.image}" onerror="this.src='https://via.placeholder.com/250'">
                <h3>${p.name}</h3>
                <p>${p.price} دولار</p>
                <button class="btn" onclick="addToCart(${p.id})">أضف للسلة</button>
            </div>
        `;
    });
</script>
</body>
</html>
